spring:
  profiles:
    active: test
  datasource:
    # Adding ;MODE=MySQL helps H2 understand MySQL-style syntax
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: create-drop # Essential since we are disabling Flyway
    show-sql: true
  flyway:
    enabled: false # Ensure this is indented under 'spring:'

logging:
    level:
      org.springframework.boot: DEBUG